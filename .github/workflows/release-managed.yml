name: Managed Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to release
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm install -g npm@11
      - run: npm ci

      - name: Validate version input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${{ inputs.version }}"
            exit 1
          fi

      - name: Ensure branch is main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Managed release must run from main"
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse --verify --quiet "refs/tags/v${{ inputs.version }}" >/dev/null; then
            echo "Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Bump package version
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      - name: Verify release
        run: npm run verify:release

      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Release ${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
